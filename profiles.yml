cea_aw:
  target: dev
  outputs:
    dev:
      type: databricks
      method: token
      host: "{{ env_var('DBT_DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DBT_DATABRICKS_HTTP_PATH') }}"
      catalog: "{{ env_var('DBT_DATABRICKS_CATALOG', 'hive_metastore') }}"
      schema: "{{ env_var('DBT_DATABRICKS_SCHEMA', 'cea_aw_dev') }}"
      token: "{{ env_var('DBT_DATABRICKS_TOKEN') }}"
      threads: "{{ env_var('DBT_THREADS', '4') | int }}"

    prod:
      type: databricks
      method: token
      host: "{{ env_var('DBT_DATABRICKS_HOST') }}"
      http_path: "{{ env_var('DBT_DATABRICKS_HTTP_PATH_PROD', env_var('DBT_DATABRICKS_HTTP_PATH')) }}"
      catalog: "{{ env_var('DBT_DATABRICKS_CATALOG_PROD', env_var('DBT_DATABRICKS_CATALOG', 'hive_metastore')) }}"
      schema: "{{ env_var('DBT_DATABRICKS_SCHEMA_PROD', 'cea_aw_prod') }}"
      token: "{{ env_var('DBT_DATABRICKS_TOKEN_PROD', env_var('DBT_DATABRICKS_TOKEN')) }}"
      threads: "{{ env_var('DBT_THREADS', '8') | int }}"
