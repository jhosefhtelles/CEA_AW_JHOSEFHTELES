
# Name your project! Project names should contain only lowercase characters
# and underscores. A good package name should reflect your organization's
# name or the intended use of these models
name: "cea_aw"
version: "1.0.0"

flags:
  use_managed_iceberg: True
  use_concurrent_microbatch: True
  use_materialization_v2: True

# This setting configures which "profile" dbt uses for this project.
profile: "cea_aw"

# These configurations specify where dbt should look for different types of files.
# The `model-paths` config, for example, states that models in this project can be
# found in the "models/" directory. You probably won't need to change these!
model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets: # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Define defaults for how objects are created in the warehouse.
# You can override these values per model using `{{ config(...) }}`.
models:
  cea_aw:
    +persist_docs:
      relation: true
      columns: true

    # Suggested structure for analytics engineering layers:
    # models/staging   -> raw-source cleaning, generally as views
    # models/intermediate -> business transformations, ephemeral/view
    # models/marts     -> final trusted outputs, generally as tables
    staging:
      +materialized: view
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table

# Optional: centralize custom variables used by macros/models.
vars: {}
